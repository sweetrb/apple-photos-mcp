# pnpm workspace config. Single-package repo ‚Äî this file exists mainly to carry
# the build-script approvals below. pnpm 11 reads build-script consent ONLY from
# `allowBuilds` here (the v10 `onlyBuiltDependencies`, the package.json `pnpm`
# field, and `.npmrc` are all ignored). Without approving esbuild, `pnpm install`
# fails with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true

# Pin pnpm 11's supply-chain minimum-release-age default explicitly (1440 min = 1 day)
# so it is documented and stable across pnpm upgrades. See https://pnpm.io/supply-chain-security.
minimumReleaseAge: 1440

# The MCP SDK currently caps these transitive dependencies below their first
# fully patched releases. Keep the overrides until the SDK's ranges move past
# these security fixes.
overrides:
  "@hono/node-server": 2.0.10
  fast-uri: 3.1.4
